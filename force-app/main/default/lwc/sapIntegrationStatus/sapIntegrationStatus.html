<template>
  <lightning-card>
    <div slot="title" class="card-title">
      <lightning-icon
        icon-name="utility:connected_apps"
        size="small"
        class="title-icon"
      ></lightning-icon>
      <span>Integração SAP</span>
    </div>

    <div class="slds-p-horizontal_medium slds-p-bottom_medium">
      <template if:true={isLoading}>
        <div class="slds-align_absolute-center slds-p-vertical_medium">
          <lightning-spinner
            size="small"
            alternative-text="Carregando status SAP"
          ></lightning-spinner>
        </div>
      </template>

      <template if:false={isLoading}>
        <template if:true={hasError}>
          <div
            class="slds-text-color_error slds-m-bottom_small slds-text-body_small"
          >
            {errorMessage}
          </div>
        </template>

        <template if:false={hasError}>
          <!-- Status Banner -->
          <div class={bannerClass} role="status" aria-label={statusLabel}>
            <div class="banner-inner">
              <div class="banner-icon-wrap">
                <lightning-icon
                  icon-name={statusIconName}
                  size="medium"
                  alternative-text={statusLabel}
                  class="banner-icon"
                >
                </lightning-icon>
                <template if:true={isPending}>
                  <div class="pulse-ring"></div>
                </template>
              </div>
              <div class="banner-body">
                <p class="banner-label">{statusLabel}</p>
                <p class="banner-subtitle">{statusSubtitle}</p>
              </div>
              <div class="banner-badge-wrap">
                <span class={badgeClass}>{badgeText}</span>
              </div>
            </div>
          </div>

          <!-- Error details -->
          <template if:true={hasErrorDetails}>
            <div class="slds-m-top_small">
              <lightning-accordion allow-multiple-sections-open>
                <lightning-accordion-section
                  name="details"
                  label="Ver detalhes do erro"
                >
                  <div class="error-block">
                    <pre class="error-pre">{statusBody}</pre>
                  </div>
                </lightning-accordion-section>
              </lightning-accordion>
            </div>
          </template>
        </template>
      </template>
    </div>
  </lightning-card>
</template>
