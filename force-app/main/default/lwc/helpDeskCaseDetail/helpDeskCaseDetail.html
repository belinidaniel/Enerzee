<template>
  <article class="detail-container slds-card">
    <template if:true={detail}>
      <div class="header-block">
        <p class="case-number">Caso #{detail.caseNumber}</p>
        <h2 class="case-subject">{detail.subject}</h2>
      </div>

      <section class="summary-card">
        <div class="summary-item">
          <p class="label">Aberto em</p>
          <p class="value">{detail.createdDateDisplay}</p>
        </div>
        <div class="summary-item">
          <p class="label">Status</p>
          <span class="status-badge" style={statusBadgeStyle}
            >{detail.helpDeskStatus}</span
          >
        </div>
        <div class="summary-item action">
          <p class="label">Ações</p>
          <lightning-button
            variant="neutral"
            label="Reabrir"
            disabled={isOpen}
          ></lightning-button>
        </div>
      </section>

      <lightning-tabset active-tab-value="activity">
        <lightning-tab label="Atividade" value="activity">
          <section class="composer">
            <label class="label composer-label">Adicionar um comentário</label>
            <lightning-textarea
              value={newComment}
              placeholder="Compartilhe uma atualização com o time de suporte"
              onchange={handleCommentChange}
            ></lightning-textarea>
            <div class="file-picker">
              <lightning-input
                type="file"
                label="Anexar arquivos"
                multiple
                accept={acceptedFormats}
                onchange={handleFilesChange}
              ></lightning-input>
              <template if:true={pendingFiles.length}>
                <ul class="pending-list">
                  <template for:each={pendingFiles} for:item="file">
                    <li key={file.name} class="pending-item">
                      <lightning-icon
                        icon-name="utility:attachment"
                        size="x-small"
                      ></lightning-icon>
                      <span class="pending-name">{file.name}</span>
                      <span class="pending-size">({file.humanSize})</span>
                      <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Remover"
                        size="x-small"
                        onclick={removePendingFile}
                        data-name={file.name}
                      ></lightning-button-icon>
                    </li>
                  </template>
                </ul>
              </template>
            </div>
            <div class="composer-actions">
              <lightning-button
                variant="brand"
                label="Adicionar comentário"
                onclick={handleAddComment}
                disabled={isAddDisabled}
              ></lightning-button>
            </div>
          </section>

          <section class="feed">
            <template if:true={hasMessages}>
              <template for:each={messages} for:item="msg">
                <div key={msg.id} class="feed-item" data-agent={msg.isAgent}>
                  <div class="feed-avatar">
                    <lightning-avatar
                      fallback-icon-name="standard:user"
                      alternative-text={msg.authorName}
                      size="medium"
                      initials={msg.initials}
                    ></lightning-avatar>
                  </div>
                  <div class="feed-body">
                    <div class="feed-meta">
                      <span class="author">{msg.authorName}</span>
                      <span class="author-type-badge" data-agent={msg.isAgent}
                        >{msg.authorType}</span
                      >
                      <span class="date">{msg.date}</span>
                    </div>
                    <div class="feed-text">{msg.body}</div>
                    <template if:true={msg.hasAttachments}>
                      <ul class="msg-attachment-list">
                        <template for:each={msg.attachments} for:item="att">
                          <li key={att.id} class="msg-attachment-item">
                            <lightning-icon
                              icon-name="utility:attachment"
                              size="x-small"
                            ></lightning-icon>
                            <a
                              href={att.downloadUrl}
                              target="_blank"
                              rel="noopener noreferrer"
                              class="att-link"
                              >{att.title}</a
                            >
                            <span class="att-size">{att.size}</span>
                          </li>
                        </template>
                      </ul>
                    </template>
                  </div>
                </div>
              </template>
            </template>
            <template if:false={hasMessages}>
              <p class="empty-feed">
                Sem comentários ainda. Adicione o primeiro para atualizar o
                time.
              </p>
            </template>
          </section>
        </lightning-tab>

        <lightning-tab label="Detalhes" value="details">
          <section class="details-card">
            <div class="details-row">
              <div>
                <p class="label">Número do Caso</p>
                <p class="value">{detail.caseNumber}</p>
              </div>
              <div>
                <p class="label">Assunto</p>
                <p class="value">{detail.subject}</p>
              </div>
              <div>
                <p class="label">Status</p>
                <span class="status-badge" style={statusBadgeStyle}
                  >{detail.helpDeskStatus}</span
                >
              </div>
            </div>
            <div class="details-row">
              <div>
                <p class="label">Contato</p>
                <p class="value">{detail.contactName}</p>
              </div>
              <div>
                <p class="label">Aberto em</p>
                <p class="value">{detail.createdDateDisplay}</p>
              </div>
              <div>
                <p class="label">Última modificação</p>
                <p class="value">{detail.lastModifiedDisplay}</p>
              </div>
            </div>
            <div class="details-rich">
              <p class="label">Detalhes</p>
              <template if:true={detail.richDescription}>
                <lightning-formatted-rich-text
                  value={detail.richDescription}
                ></lightning-formatted-rich-text>
              </template>
              <template if:false={detail.richDescription}>
                <p class="empty-feed">Sem detalhes adicionais.</p>
              </template>
            </div>
          </section>
        </lightning-tab>
      </lightning-tabset>
    </template>

    <template if:false={detail}>
      <div class="placeholder">
        <lightning-spinner
          alternative-text="Carregando caso"
          size="medium"
        ></lightning-spinner>
      </div>
    </template>

    <template if:true={isSaving}>
      <div class="backdrop">
        <lightning-spinner
          alternative-text="Salvando"
          size="small"
        ></lightning-spinner>
      </div>
    </template>
  </article>
</template>
