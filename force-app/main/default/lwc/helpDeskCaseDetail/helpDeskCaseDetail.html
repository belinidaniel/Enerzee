<template>
  <article class="detail-container slds-card">
    <template if:true={detail}>
      <div class="header-block">
        <p class="case-number">Caso #{detail.caseNumber}</p>
        <h2 class="case-subject">{detail.subject}</h2>
      </div>

      <section class="summary-card">
        <div class="summary-item">
          <p class="label">Número do caso</p>
          <p class="value">{detail.caseNumber}</p>
        </div>
        <div class="summary-item">
          <p class="label">Aberto em</p>
          <p class="value">{detail.createdDateDisplay}</p>
        </div>
        <div class="summary-item">
          <p class="label">Status</p>
          <p class="value">{detail.status}</p>
        </div>
        <div class="summary-item">
          <p class="label">Contato</p>
          <p class="value">{detail.contactName}</p>
        </div>
        <div class="summary-item">
          <p class="label">Última modificação</p>
          <p class="value">{detail.lastModifiedDisplay}</p>
        </div>
        <div class="summary-item action">
          <p class="label">Ações</p>
          <lightning-button
            variant="neutral"
            label="Reabrir"
            onclick={handleReopen}
            disabled={isOpen}
          ></lightning-button>
        </div>
      </section>

      <template if:true={showApprovalPanel}>
        <section class={approvalCardClass}>
          <div>
            <p class="label">Aprovação</p>
            <lightning-badge
              label={approvalStatusLabel}
              variant={approvalBadgeVariant}
              class="approval-badge"
            ></lightning-badge>
          </div>
          <div>
            <p class="label">Com quem está</p>
            <p class="value">{currentApproverLabel}</p>
          </div>
          <div>
            <p class="label">Fluxo</p>
            <p class="value">{approvalRouteLabel}</p>
          </div>
          <template if:true={hasJiraActivity}>
            <div>
              <p class="label">Atividade Jira</p>
              <p class="value jira-activity">
                <a
                  href={detail.jiraIssueUrl}
                  target="_blank"
                  rel="noopener noreferrer"
                  >{detail.jiraIssueKey}</a
                >
                <lightning-badge
                  label={jiraStatusLabel}
                  class="approval-badge"
                ></lightning-badge>
              </p>
            </div>
          </template>
        </section>
      </template>

      <section class="details-card">
        <p class="label">Detalhes</p>
        <template if:true={detail.richDescription}>
          <lightning-formatted-rich-text
            value={detail.richDescription}
          ></lightning-formatted-rich-text>
        </template>
        <template if:false={detail.richDescription}>
          <p class="empty-feed">Sem detalhes adicionais.</p>
        </template>
      </section>

      <section class="composer">
        <label class="label composer-label">Adicionar um comentário</label>
        <lightning-textarea
          value={newComment}
          placeholder="Compartilhe uma atualização com o time de suporte"
          onchange={handleCommentChange}
        ></lightning-textarea>
        <div class="file-picker">
          <lightning-input
            type="file"
            label="Anexar arquivos"
            multiple
            accept={acceptedFormats}
            onchange={handleFilesChange}
          ></lightning-input>
          <template if:true={pendingFiles}>
            <ul class="pending-list">
              <template for:each={pendingFiles} for:item="file">
                <li key={file.name} class="pending-item">
                  <span>{file.name} ({file.humanSize})</span>
                  <lightning-button-icon
                    icon-name="utility:close"
                    alternative-text="Remover"
                    onclick={removePendingFile}
                    data-name={file.name}
                  ></lightning-button-icon>
                </li>
              </template>
            </ul>
          </template>
        </div>
        <div class="composer-actions">
          <lightning-button
            variant="brand"
            label="Adicionar comentário"
            onclick={handleAddComment}
            disabled={isAddDisabled}
          ></lightning-button>
        </div>
      </section>

      <section class="feed">
        <template if:true={hasMessages}>
          <template for:each={messages} for:item="message">
            <div key={message.id} class="feed-item slds-card">
              <div class="avatar">
                <lightning-avatar
                  fallback-icon-name="standard:user"
                  alternative-text={message.author}
                  size="medium"
                  initials={message.initials}
                ></lightning-avatar>
              </div>
              <div class="feed-body">
                <div class="feed-meta">
                  <span class="author">{message.author}</span>
                  <lightning-badge
                    label={message.authorType}
                    class="author-badge"
                  ></lightning-badge>
                  <span class="date">{message.date}</span>
                </div>
                <div class="feed-text">{message.body}</div>
                <template if:true={message.hasAttachments}>
                  <ul class="message-attachments">
                    <template for:each={message.attachments} for:item="att">
                      <li key={att.id} class="message-attachment">
                        <lightning-icon
                          icon-name={att.iconName}
                          size="small"
                          alternative-text={att.title}
                          class="attachment-type-icon"
                        ></lightning-icon>
                        <button
                          type="button"
                          class="attachment-link"
                          data-url={att.url}
                          data-title={att.title}
                          onclick={handleOpenAttachment}
                        >
                          {att.title}
                        </button>
                        <lightning-button-icon
                          icon-name="utility:preview"
                          alternative-text="Visualizar"
                          title="Visualizar"
                          data-url={att.url}
                          data-title={att.title}
                          onclick={handleOpenAttachment}
                        ></lightning-button-icon>
                        <lightning-button-icon
                          icon-name="utility:new_window"
                          alternative-text="Abrir em nova aba"
                          title="Abrir em nova aba"
                          data-url={att.url}
                          onclick={handleOpenInNewTab}
                        ></lightning-button-icon>
                      </li>
                    </template>
                  </ul>
                </template>
              </div>
            </div>
          </template>
        </template>
        <template if:false={hasMessages}>
          <p class="empty-feed">
            Sem comentários ainda. Adicione o primeiro para atualizar o time.
          </p>
        </template>
      </section>
    </template>
    <template if:false={detail}>
      <div class="placeholder">
        <lightning-spinner
          alternative-text="Loading case"
          size="medium"
        ></lightning-spinner>
      </div>
    </template>
    <template if:true={isSaving}>
      <div class="backdrop">
        <lightning-spinner
          alternative-text="Saving"
          size="small"
        ></lightning-spinner>
      </div>
    </template>

    <c-attachment-preview-modal
      open={previewOpen}
      url={previewUrl}
      title={previewTitle}
      onclose={handleClosePreview}
    ></c-attachment-preview-modal>
  </article>
</template>
