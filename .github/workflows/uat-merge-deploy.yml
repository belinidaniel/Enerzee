name: UAT Deploy

on:
  push:
    branches:
      - UAT

jobs:
  deploy:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
      statuses: write

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Setup Node + SF CLI ─────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SF CLI
        run: npm install --global @salesforce/cli@latest

      - name: Install sfdx-git-delta
        run: echo y | sf plugins install sfdx-git-delta

      # ─── Authenticate to UAT ─────────────────────────────────────────────────
      # Secret: SFDX_AUTH_URL_UAT
      # Como gerar: sf org display --verbose --target-org enerzee-UAT | grep "Sfdx Auth Url"
      - name: Authenticate UAT
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_UAT }}" > /tmp/auth_url.txt
          sf org login sfdx-url --sfdx-url-file /tmp/auth_url.txt --alias enerzee-UAT --set-default
          rm /tmp/auth_url.txt

      # ─── Identify changed files in this merge ────────────────────────────────
      - name: Get changed files
        id: changed
        run: |
          python3 scripts/apex_test_catalog.py collect-tests \
            --diff-range HEAD~1..HEAD \
            --metadata-pattern '^force-app/' \
            --github-output "$GITHUB_OUTPUT" \
            --strict-changed-prod

      # ─── Skip if no metadata changed ─────────────────────────────────────────
      - name: Skip if no metadata changes
        if: steps.changed.outputs.has_changes == 'false'
        run: echo "No Salesforce metadata changed. Skipping deploy."

      # ─── Generate delta package ───────────────────────────────────────────────
      - name: Generate delta package
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          echo "Delta from: HEAD~1 → HEAD (${{ github.sha }})"
          sf sgd source delta \
            --from HEAD~1 \
            --to HEAD \
            --source force-app \
            --output .
          echo "--- package.xml ---"
          cat package/package.xml
          echo "--- destructiveChanges.xml ---"
          cat destructiveChanges/destructiveChanges.xml

      - name: Find merged pull request
        if: steps.changed.outputs.has_changes == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            const pr = response.data.find(item => item.base?.ref === branch) || response.data[0];
            core.setOutput('number', pr ? String(pr.number) : '');
            core.setOutput('head_sha', pr?.head?.sha || '');

      - name: Find successful validation run
        if: steps.changed.outputs.has_changes == 'true' && steps.pr.outputs.head_sha != ''
        id: validation_run
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflowId = 'uat-pr-validate.yml';
            const headSha = '${{ steps.pr.outputs.head_sha }}';
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              event: 'pull_request',
              per_page: 100,
            });

            const run = runs.find(item => item.head_sha === headSha && item.conclusion === 'success');
            core.setOutput('run_id', run ? String(run.id) : '');

      - name: Download quick deploy metadata
        if: steps.changed.outputs.has_changes == 'true' && steps.validation_run.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: quick-deploy-uat-${{ steps.pr.outputs.head_sha }}
          path: /tmp/quick-deploy
          repository: ${{ github.repository }}
          run-id: ${{ steps.validation_run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Evaluate quick deploy metadata
        if: steps.changed.outputs.has_changes == 'true'
        id: quick
        run: |
          set -euo pipefail

          PACKAGE_HASH=$(sha256sum package/package.xml | awk '{print $1}')
          DESTRUCTIVE_HASH=""
          if grep -q '<types>' ./destructiveChanges/destructiveChanges.xml 2>/dev/null; then
            DESTRUCTIVE_HASH=$(sha256sum destructiveChanges/destructiveChanges.xml | awk '{print $1}')
          fi

          QUICK_METADATA_FILE=/tmp/quick-deploy/quick-deploy-uat.json
          if [ ! -f "$QUICK_METADATA_FILE" ]; then
            echo "use_quick_deploy=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          EXPECTED_TESTS=$(printf '%s\n' "${{ steps.changed.outputs.test_classes }}" | tr ' ' '\n' | sed '/^$/d' | sort -u | jq -R . | jq -c -s .)
          QUICK_DEPLOY_ID=$(jq -r '.validationJobId // empty' "$QUICK_METADATA_FILE")
          QUICK_TARGET_ORG=$(jq -r '.targetOrg // empty' "$QUICK_METADATA_FILE")
          QUICK_HEAD_SHA=$(jq -r '.headSha // empty' "$QUICK_METADATA_FILE")
          QUICK_PACKAGE_HASH=$(jq -r '.manifestSha256 // empty' "$QUICK_METADATA_FILE")
          QUICK_DESTRUCTIVE_HASH=$(jq -r '.destructiveSha256 // empty' "$QUICK_METADATA_FILE")
          QUICK_TEST_LEVEL=$(jq -r '.testLevel // empty' "$QUICK_METADATA_FILE")
          QUICK_TESTS=$(jq -c '(.tests // []) | sort' "$QUICK_METADATA_FILE")

          if [ -n "$QUICK_DEPLOY_ID" ] &&
             [ "$QUICK_TARGET_ORG" = "enerzee-UAT" ] &&
             [ "$QUICK_HEAD_SHA" = "${{ steps.pr.outputs.head_sha }}" ] &&
             [ "$QUICK_PACKAGE_HASH" = "$PACKAGE_HASH" ] &&
             [ "$QUICK_DESTRUCTIVE_HASH" = "$DESTRUCTIVE_HASH" ] &&
             [ "$QUICK_TEST_LEVEL" = "${{ steps.changed.outputs.test_level }}" ] &&
             [ "$QUICK_TESTS" = "$EXPECTED_TESTS" ]; then
            echo "use_quick_deploy=true" >> $GITHUB_OUTPUT
            echo "quick_deploy_id=$QUICK_DEPLOY_ID" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "use_quick_deploy=false" >> $GITHUB_OUTPUT

      # ─── Deploy to UAT ────────────────────────────────────────────────────────
      - name: Deploy to UAT
        if: steps.changed.outputs.has_changes == 'true'
        id: deploy
        run: |
          set -euo pipefail

          TEST_LEVEL="${{ steps.changed.outputs.test_level }}"
          TEST_ARGS=()
          if [ "$TEST_LEVEL" = "RunSpecifiedTests" ] && [ -n "${{ steps.changed.outputs.test_classes }}" ]; then
            for test_class in ${{ steps.changed.outputs.test_classes }}; do
              TEST_ARGS+=(--tests "$test_class")
            done
          fi

          DESTRUCTIVE_ARGS=()
          if grep -q '<types>' ./destructiveChanges/destructiveChanges.xml 2>/dev/null; then
            DESTRUCTIVE_ARGS+=(--post-destructive-changes destructiveChanges/destructiveChanges.xml)
          fi

          VALIDATION_ID=""

          run_validation_for_quick_deploy() {
            sf project deploy validate \
              --manifest package/package.xml \
              --target-org enerzee-UAT \
              --test-level "$TEST_LEVEL" \
              "${TEST_ARGS[@]}" \
              "${DESTRUCTIVE_ARGS[@]}" \
              --async \
              --json > /tmp/validation_start.json

            VALIDATION_ID=$(jq -r '.result.id // empty' /tmp/validation_start.json)
            if [ -z "$VALIDATION_ID" ]; then
              echo "::error::Não foi possível obter o validation id."
              cat /tmp/validation_start.json
              exit 1
            fi

            echo "Validation ID: $VALIDATION_ID"

            while true; do
              sf project deploy report \
                --job-id "$VALIDATION_ID" \
                --target-org enerzee-UAT \
                --json > /tmp/validation_result.json

              VALIDATION_STATUS=$(jq -r '.result.status // "Unknown"' /tmp/validation_result.json)
              COMPONENTS_DONE=$(jq -r '.result.numberComponentsDeployed // 0' /tmp/validation_result.json)
              COMPONENTS_TOTAL=$(jq -r '.result.numberComponentsTotal // 0' /tmp/validation_result.json)
              TESTS_DONE=$(jq -r '.result.numberTestsCompleted // 0' /tmp/validation_result.json)
              TESTS_TOTAL=$(jq -r '.result.numberTestsTotal // 0' /tmp/validation_result.json)

              echo "Validation status: $VALIDATION_STATUS | Componentes: ${COMPONENTS_DONE}/${COMPONENTS_TOTAL} | Testes: ${TESTS_DONE}/${TESTS_TOTAL}"

              case "$VALIDATION_STATUS" in
                Pending|InProgress|Canceling)
                  sleep 15
                  ;;
                Succeeded)
                  break
                  ;;
                Failed|Canceled|SucceededPartial)
                  break
                  ;;
                *)
                  echo "::warning::Status inesperado da validação: $VALIDATION_STATUS"
                  sleep 15
                  ;;
              esac
            done

            jq -r '.result.details.componentFailures[]? | "::error file=\(.fileName),line=\(.lineNumber)::\(.problem)"' /tmp/validation_result.json 2>/dev/null || true
            jq -r '.result.details.runTestResult.failures[]? | "::error::\(.testName): \(.message)"' /tmp/validation_result.json 2>/dev/null || true
            jq -r '.result.details.runTestResult.codeCoverageWarnings[]? | "::warning::\(.message)"' /tmp/validation_result.json 2>/dev/null || true

            FINAL_VALIDATION_STATUS=$(jq -r '.result.status // "Unknown"' /tmp/validation_result.json)
            if [ "$FINAL_VALIDATION_STATUS" != "Succeeded" ]; then
              cp /tmp/validation_result.json /tmp/deploy_result.json
              exit 1
            fi
          }

          run_quick_deploy() {
            local validation_job_id="$1"
            sf project deploy quick \
              --job-id "$validation_job_id" \
              --target-org enerzee-UAT \
              --json > /tmp/deploy_result.json 2>&1
          }

          QUICK_DEPLOY_ID="${{ steps.quick.outputs.quick_deploy_id }}"
          if [ -n "$QUICK_DEPLOY_ID" ]; then
            echo "Trying quick deploy with saved validation id: $QUICK_DEPLOY_ID"
            if run_quick_deploy "$QUICK_DEPLOY_ID"; then
              cat /tmp/deploy_result.json
              STATUS=$(python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', 1))" < /tmp/deploy_result.json)
              exit "$STATUS"
            fi

            echo "::warning::Quick deploy com ID salvo falhou; será feita nova validação."
            cat /tmp/deploy_result.json
          else
            echo "No reusable quick deploy ID found. Running validation first."
          fi

          run_validation_for_quick_deploy
          if ! run_quick_deploy "$VALIDATION_ID"; then
            cat /tmp/deploy_result.json
            exit 1
          fi

          cat /tmp/deploy_result.json

          STATUS=$(python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', 1))" < /tmp/deploy_result.json)
          exit "$STATUS"

      # ─── Report result ────────────────────────────────────────────────────────
      - name: Report deploy result
        if: always() && steps.changed.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const deploySuccess = '${{ steps.deploy.outcome }}' === 'success';

            let details = '';
            let testSummary = '';
            try {
              const raw = fs.readFileSync('/tmp/deploy_result.json', 'utf8');
              const json = JSON.parse(raw);
              const result = json?.result;

              if (result?.details?.componentFailures?.length > 0) {
                const failures = result.details.componentFailures.map(e =>
                  `| \`${e.fileName}\` | ${e.lineNumber || '-'} | ${e.problem} |`
                ).join('\n');
                details = `\n\n### ❌ Component Failures\n| File | Line | Error |\n|---|---|---|\n${failures}`;
              }

              if (result?.details?.runTestResult) {
                const tests = result.details.runTestResult;
                const coverage = tests.codeCoverage?.map(c => {
                  const pct = Math.round(((c.numLocations - c.numLocationsNotCovered) / c.numLocations) * 100);
                  return `| ${c.name} | ${c.numLocations - c.numLocationsNotCovered}/${c.numLocations} | ${pct}% |`;
                }).join('\n') || '';
                testSummary = `\n\n### 🧪 Test Results\n` +
                  `- Passed: ${tests.numTestsRun - (tests.failures?.length || 0)}\n` +
                  `- Failed: ${tests.failures?.length || 0}\n` +
                  (tests.failures?.length > 0 ? `\n**Failures:**\n${tests.failures.map(f => `- \`${f.name}.${f.methodName}\`: ${f.message}`).join('\n')}` : '') +
                  (coverage ? `\n\n**Coverage:**\n| Class | Lines | % |\n|---|---|---|\n${coverage}` : '');
              }
            } catch (e) {
              details = '\n\n⚠️ Não foi possível ler resultado detalhado do deploy.';
            }

            const status = deploySuccess ? '✅' : '❌';
            const summary = deploySuccess
              ? '**Deploy concluído com sucesso**'
              : '**Deploy falhou — rollback automático pelo Salesforce**';

            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: deploySuccess ? 'success' : 'failure',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: deploySuccess ? 'Deploy to UAT succeeded' : 'Deploy to UAT failed',
              context: 'UAT Deploy'
            });

            console.log(`## UAT Deploy Report ${status}\n**Org:** UAT (enerzee-UAT)\n**Apex:** ${{ steps.changed.outputs.apex_classes || 'none' }}\n**Test level:** ${{ steps.changed.outputs.test_level || 'RunLocalTests' }}\n**Tests:** ${{ steps.changed.outputs.test_classes || 'none' }}\n${summary}${details}${testSummary}`);

      - name: Fail job if deploy failed
        if: steps.deploy.outcome == 'failure'
        run: exit 1
