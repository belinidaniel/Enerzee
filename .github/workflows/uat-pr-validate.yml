name: UAT PR Validation

on:
  pull_request:
    branches:
      - UAT
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate against UAT
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Setup Node + SF CLI ─────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SF CLI
        run: npm install --global @salesforce/cli@latest

      - name: Install sfdx-git-delta
        run: echo y | sf plugins install sfdx-git-delta

      # ─── Authenticate to UAT ─────────────────────────────────────────────────
      # Secret: SFDX_AUTH_URL_UAT
      # Como gerar: sf org display --verbose --target-org enerzee-UAT | grep "Sfdx Auth Url"
      - name: Authenticate UAT
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_UAT }}" > /tmp/auth_url.txt
          sf org login sfdx-url --sfdx-url-file /tmp/auth_url.txt --alias enerzee-UAT --set-default
          rm /tmp/auth_url.txt

      # ─── Identify changed files ───────────────────────────────────────────────
      - name: Get changed files
        id: changed
        run: |
          set +e
          python3 scripts/apex_test_catalog.py collect-tests \
            --diff-range origin/UAT...HEAD \
            --metadata-pattern '^force-app/' \
            --github-output "$GITHUB_OUTPUT" \
            --strict-changed-prod 2>&1 | tee /tmp/collect_tests.log
          STATUS=${PIPESTATUS[0]}
          set -e
          exit "$STATUS"

      # ─── Generate delta package (only PR changes) ────────────────────────────
      - name: Generate delta package
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          MERGE_BASE=$(git merge-base HEAD origin/UAT)
          echo "Delta from: $MERGE_BASE → HEAD (${{ github.sha }})"
          sf sgd source delta \
            --from "$MERGE_BASE" \
            --to HEAD \
            --source force-app \
            --output .
          echo "--- package.xml ---"
          cat package/package.xml
          echo "--- destructiveChanges.xml ---"
          cat destructiveChanges/destructiveChanges.xml

      # ─── Static Analysis (PMD via Salesforce Code Analyzer) ──────────────────
      - name: Run Code Analyzer
        if: steps.changed.outputs.has_changes == 'true'
        id: analysis
        continue-on-error: true
        run: |
          sf plugins install @salesforce/sfdx-scanner

          CHANGED_APEX=$(git diff --name-only origin/UAT...HEAD | grep '\.cls$' | tr '\n' ',' | sed 's/,$//')

          if [ -n "$CHANGED_APEX" ]; then
            sf scanner run \
              --target "$CHANGED_APEX" \
              --format table \
              --severity-threshold 2 \
              --engine pmd \
              2>&1 | tee /tmp/analysis_result.txt || true
          else
            echo "No Apex files changed." | tee /tmp/analysis_result.txt
          fi

      # ─── Validation for Quick Deploy ─────────────────────────────────────────
      - name: Validate Deploy for Quick Deploy
        if: steps.changed.outputs.has_changes == 'true'
        id: deploy
        run: |
          set -euo pipefail

          TEST_LEVEL="${{ steps.changed.outputs.test_level }}"
          TEST_ARGS=()
          if [ "$TEST_LEVEL" = "RunSpecifiedTests" ] && [ -n "${{ steps.changed.outputs.test_classes }}" ]; then
            for test_class in ${{ steps.changed.outputs.test_classes }}; do
              TEST_ARGS+=(--tests "$test_class")
            done
          fi

          DESTRUCTIVE_ARGS=()
          if grep -q '<types>' ./destructiveChanges/destructiveChanges.xml 2>/dev/null; then
            DESTRUCTIVE_ARGS+=(--post-destructive-changes destructiveChanges/destructiveChanges.xml)
          fi

          echo "Test level: $TEST_LEVEL"
          echo "Tests: ${{ steps.changed.outputs.test_classes }}"

          sf project deploy validate \
            --manifest package/package.xml \
            --target-org enerzee-UAT \
            --test-level "$TEST_LEVEL" \
            "${TEST_ARGS[@]}" \
            "${DESTRUCTIVE_ARGS[@]}" \
            --async \
            --json > /tmp/deploy_start.json

          DEPLOY_ID=$(jq -r '.result.id // empty' /tmp/deploy_start.json)
          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::Não foi possível obter o deploy id."
            cat /tmp/deploy_start.json
            exit 1
          fi

          echo "Deploy ID: $DEPLOY_ID"
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

          while true; do
            sf project deploy report \
              --job-id "$DEPLOY_ID" \
              --target-org enerzee-UAT \
              --json > /tmp/deploy_result.json

            DEPLOY_STATUS=$(jq -r '.result.status // "Unknown"' /tmp/deploy_result.json)
            COMPONENTS_DONE=$(jq -r '.result.numberComponentsDeployed // 0' /tmp/deploy_result.json)
            COMPONENTS_TOTAL=$(jq -r '.result.numberComponentsTotal // 0' /tmp/deploy_result.json)
            TESTS_DONE=$(jq -r '.result.numberTestsCompleted // 0' /tmp/deploy_result.json)
            TESTS_TOTAL=$(jq -r '.result.numberTestsTotal // 0' /tmp/deploy_result.json)

            echo "Status atual: $DEPLOY_STATUS | Componentes: ${COMPONENTS_DONE}/${COMPONENTS_TOTAL} | Testes: ${TESTS_DONE}/${TESTS_TOTAL}"

            case "$DEPLOY_STATUS" in
              Pending|InProgress|Canceling)
                sleep 15
                ;;
              Succeeded)
                break
                ;;
              Failed|Canceled|SucceededPartial)
                break
                ;;
              *)
                echo "::warning::Status inesperado da validação: $DEPLOY_STATUS"
                sleep 15
                ;;
            esac
          done

          jq -r '.result.details.componentFailures[]? | "::error file=\(.fileName),line=\(.lineNumber)::\(.problem)"' /tmp/deploy_result.json 2>/dev/null || true
          jq -r '.result.details.runTestResult.failures[]? | "::error::\(.testName): \(.message)"' /tmp/deploy_result.json 2>/dev/null || true
          jq -r '.result.details.runTestResult.codeCoverageWarnings[]? | "::warning::\(.message)"' /tmp/deploy_result.json 2>/dev/null || true

          FINAL_STATUS=$(jq -r '.result.status // "Unknown"' /tmp/deploy_result.json)
          if [ "$FINAL_STATUS" != "Succeeded" ]; then
            exit 1
          fi

      - name: Create quick deploy metadata
        if: steps.changed.outputs.has_changes == 'true' && steps.deploy.outcome == 'success'
        run: |
          set -euo pipefail

          PACKAGE_HASH=$(sha256sum package/package.xml | awk '{print $1}')
          DESTRUCTIVE_HASH=""
          if grep -q '<types>' ./destructiveChanges/destructiveChanges.xml 2>/dev/null; then
            DESTRUCTIVE_HASH=$(sha256sum destructiveChanges/destructiveChanges.xml | awk '{print $1}')
          fi

          TESTS_JSON=$(printf '%s\n' "${{ steps.changed.outputs.test_classes }}" | tr ' ' '\n' | sed '/^$/d' | jq -R . | jq -s .)

          cat > /tmp/quick-deploy-uat.json <<EOF
          {
            "schemaVersion": 1,
            "validationJobId": "${{ steps.deploy.outputs.deploy_id }}",
            "targetOrg": "enerzee-UAT",
            "validatedAtUtc": "$(date -u +%FT%TZ)",
            "workflowRunId": "${{ github.run_id }}",
            "workflowName": "${{ github.workflow }}",
            "headSha": "${{ github.event.pull_request.head.sha }}",
            "baseRef": "${{ github.base_ref }}",
            "manifestSha256": "${PACKAGE_HASH}",
            "destructiveSha256": "${DESTRUCTIVE_HASH}",
            "testLevel": "${{ steps.changed.outputs.test_level }}",
            "tests": ${TESTS_JSON}
          }
          EOF

          cat /tmp/quick-deploy-uat.json

      - name: Upload quick deploy metadata
        if: steps.changed.outputs.has_changes == 'true' && steps.deploy.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: quick-deploy-uat-${{ github.event.pull_request.head.sha }}
          path: /tmp/quick-deploy-uat.json
          retention-days: 10

      # ─── Job Summary + Comment on PR ─────────────────────────────────────────
      - name: Write job summary and comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let deployStatus = '⚠️';
            let deployResult = '⚠️ Deploy result not available';
            let compileErrors = [];
            let testFailures = [];
            let coverageWarnings = [];

            try {
              const json = JSON.parse(fs.readFileSync('/tmp/deploy_result.json', 'utf8'));
              const cliStatus = json.status;
              const deployStatusText = json?.result?.status;
              const deploySucceeded =
                cliStatus === 0 &&
                (!deployStatusText || deployStatusText === 'Succeeded');

              if (deploySucceeded) {
                deployStatus = '✅';
                deployResult = '✅ **Validation passed** — pronta para quick deploy sem erros de compilação ou testes';
              } else {
                deployStatus = '❌';
                const details = json?.result?.details || {};
                compileErrors = details.componentFailures || [];
                testFailures = (details.runTestResult?.failures || []);
                coverageWarnings = (details.runTestResult?.codeCoverageWarnings || []);
                deployResult = `❌ **Validation falhou** — ${compileErrors.length} erros de compilação, ${testFailures.length} falhas de teste`;
                if (!compileErrors.length && !testFailures.length) {
                  deployResult = `❌ **Validation falhou** — ${deployStatusText || json.message || 'Erro desconhecido'}`;
                }
              }
            } catch (e) {
              deployResult = `⚠️ Não foi possível ler resultado da validação: ${e.message}`;
              try {
                const collectLog = fs.readFileSync('/tmp/collect_tests.log', 'utf8').trim();
                if (collectLog) {
                  deployResult += `\n\n### 🧩 Seleção de testes\n\`\`\`\n${collectLog.substring(0, 3000)}\n\`\`\``;
                }
              } catch (ignored) {}
            }

            let analysisResult = '';
            try {
              const analysis = fs.readFileSync('/tmp/analysis_result.txt', 'utf8');
              analysisResult = analysis.trim()
                ? `\n\n### 🔍 Code Analyzer\n\`\`\`\n${analysis.substring(0, 3000)}\n\`\`\``
                : '\n\n### 🔍 Code Analyzer\n✅ Sem problemas encontrados';
            } catch (e) {}

            let compileSection = '';
            if (compileErrors.length) {
              const rows = compileErrors.map(e =>
                `| \`${e.fileName}\` | ${e.lineNumber || '-'} | ${e.problem} |`
              ).join('\n');
              compileSection = `\n\n### 🔴 Erros de Compilação (${compileErrors.length})\n| Arquivo | Linha | Erro |\n|---|---|---|\n${rows}`;
            }

            let testSection = '';
            if (testFailures.length) {
              const rows = testFailures.slice(0, 100).map(f =>
                `| \`${f.testName}\` | ${(f.message || '').replace(/\|/g, '\\|').substring(0, 150)} |`
              ).join('\n');
              const truncNote = testFailures.length > 100 ? `\n_... e mais ${testFailures.length - 100} falhas. Ver [Job Summary](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})_` : '';
              testSection = `\n\n### 🔴 Falhas de Teste (${testFailures.length})\n| Teste | Mensagem |\n|---|---|\n${rows}${truncNote}`;
            }

            let coverageSection = '';
            if (coverageWarnings.length) {
              const rows = coverageWarnings.map(w => `- ${w.message}`).join('\n');
              coverageSection = `\n\n### ⚠️ Cobertura Insuficiente (${coverageWarnings.length})\n${rows}`;
            }

            const changedApex = `${{ steps.changed.outputs.apex_classes }}`;

            const summary = [
              `## UAT PR Validation ${deployStatus}`,
              `**Branch:** \`${{ github.head_ref }}\` → \`UAT\` | **Org:** enerzee-UAT`,
              `### 🚀 Resultado`,
              deployResult,
              compileSection,
              testSection,
              coverageSection,
              analysisResult,
              `---`,
              `**Apex alterado:** ${changedApex || '_nenhum_'}`,
              `**Test level:** ${{ steps.changed.outputs.test_level || 'RunLocalTests' }}`,
              `**Tests:** ${{ steps.changed.outputs.test_classes || '_nenhum_' }}`,
            ].filter(Boolean).join('\n');

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary + '\n');

            const body = [
              `## UAT PR Validation Report ${deployStatus}`,
              `**Branch:** \`${{ github.head_ref }}\` → \`UAT\` | **Org:** UAT (enerzee-UAT)`,
              `### 🚀 Validation for Quick Deploy`,
              deployResult,
              compileSection,
              testSection,
              coverageSection,
              analysisResult,
              `---`,
              `**Test level:** ${{ steps.changed.outputs.test_level || 'RunLocalTests' }}`,
              `**Tests:** ${{ steps.changed.outputs.test_classes || '_nenhum_' }}`,
              `_Gerado automaticamente por [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})_`,
            ].filter(Boolean).join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
