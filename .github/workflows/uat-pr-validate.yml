name: UAT PR Validation

on:
  pull_request:
    branches:
      - UAT
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate against UAT
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Setup Node + SF CLI ─────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SF CLI
        run: npm install --global @salesforce/cli@latest

      - name: Install sfdx-git-delta
        run: echo y | sf plugins install sfdx-git-delta

      # ─── Authenticate to UAT ─────────────────────────────────────────────────
      # Secret: SFDX_AUTH_URL_UAT
      # Como gerar: sf org display --verbose --target-org enerzee-UAT | grep "Sfdx Auth Url"
      - name: Authenticate UAT
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_UAT }}" > /tmp/auth_url.txt
          sf org login sfdx-url --sfdx-url-file /tmp/auth_url.txt --alias enerzee-UAT --set-default
          rm /tmp/auth_url.txt

      # ─── Identify changed files ───────────────────────────────────────────────
      - name: Get changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/UAT...HEAD | grep -E '\.(cls|trigger|lwc|flow-meta\.xml|object-meta\.xml|field-meta\.xml|permissionset-meta\.xml|flexipage-meta\.xml|labels-meta\.xml)' || true)
          echo "Changed metadata files:"
          echo "$CHANGED"

          APEX=$(git diff --name-only origin/UAT...HEAD | grep '\.cls$' | grep -v 'Test\.cls$' | sed 's|force-app/main/default/classes/||' | sed 's|\.cls||' || true)
          TESTS=$(git diff --name-only origin/UAT...HEAD | grep 'Test\.cls$' | sed 's|force-app/main/default/classes/||' | sed 's|\.cls||' || true)

          for cls in $APEX; do
            test_file="force-app/main/default/classes/${cls}Test.cls"
            if [ -f "$test_file" ]; then
              TESTS="$TESTS ${cls}Test"
            fi
          done

          TESTS=$(echo "$TESTS" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
          APEX=$(echo "$APEX" | tr '\n' ' ' | xargs)
          echo "apex_classes=$APEX" >> $GITHUB_OUTPUT
          echo "test_classes=$TESTS" >> $GITHUB_OUTPUT
          echo "has_changes=$([ -n "$CHANGED" ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      # ─── Generate delta package (only PR changes) ────────────────────────────
      - name: Generate delta package
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          MERGE_BASE=$(git merge-base HEAD origin/UAT)
          echo "Delta from: $MERGE_BASE → HEAD (${{ github.sha }})"
          sf sgd source delta \
            --from "$MERGE_BASE" \
            --to HEAD \
            --source force-app \
            --output .
          echo "--- package.xml ---"
          cat package/package.xml
          echo "--- destructiveChanges.xml ---"
          cat destructiveChanges/destructiveChanges.xml

      # ─── Static Analysis (PMD via Salesforce Code Analyzer) ──────────────────
      - name: Run Code Analyzer
        if: steps.changed.outputs.has_changes == 'true'
        id: analysis
        continue-on-error: true
        run: |
          sf plugins install @salesforce/sfdx-scanner

          CHANGED_APEX=$(git diff --name-only origin/UAT...HEAD | grep '\.cls$' | tr '\n' ',' | sed 's/,$//')

          if [ -n "$CHANGED_APEX" ]; then
            sf scanner run \
              --target "$CHANGED_APEX" \
              --format table \
              --severity-threshold 2 \
              --engine pmd \
              2>&1 | tee /tmp/analysis_result.txt || true
          else
            echo "No Apex files changed." | tee /tmp/analysis_result.txt
          fi

      # ─── Dry-run Deploy (Validation) ─────────────────────────────────────────
      - name: Dry-run Deploy Validation
        if: steps.changed.outputs.has_changes == 'true'
        id: deploy
        run: |
          DESTRUCTIVE_ARG=""
          if grep -q '<types>' ./destructiveChanges/destructiveChanges.xml 2>/dev/null; then
            DESTRUCTIVE_ARG="--post-destructive-changes destructiveChanges/destructiveChanges.xml"
          fi

          sf project deploy start \
            --manifest package/package.xml \
            --target-org enerzee-UAT \
            --dry-run \
            --test-level RunLocalTests \
            $DESTRUCTIVE_ARG \
            --json > /tmp/deploy_result.json 2>&1
          DEPLOY_EXIT=$?

          # Surface errors as GitHub Actions annotations
          jq -r '.result.details.componentFailures[]? | "::error file=\(.fileName),line=\(.lineNumber)::\(.problem)"' /tmp/deploy_result.json 2>/dev/null || true
          jq -r '.result.details.runTestResult.failures[]? | "::error::\(.testName): \(.message)"' /tmp/deploy_result.json 2>/dev/null || true
          jq -r '.result.details.runTestResult.codeCoverageWarnings[]? | "::warning::\(.message)"' /tmp/deploy_result.json 2>/dev/null || true

          exit $DEPLOY_EXIT

      # ─── Parse & Comment on PR ────────────────────────────────────────────────
      - name: Comment validation result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let deployResult = '⚠️ Deploy result not available';
            let deployStatus = '⚠️';
            try {
              const raw = fs.readFileSync('/tmp/deploy_result.json', 'utf8');
              const json = JSON.parse(raw);
              if (json.status === 0) {
                deployStatus = '✅';
                deployResult = '✅ **Dry-run passed** — sem erros de compilação ou testes';
              } else {
                deployStatus = '❌';
                const errors = json?.result?.details?.componentFailures?.map(e =>
                  `- \`${e.fileName}\` linha ${e.lineNumber}: ${e.problem}`
                ).join('\n') || json.message || 'Erro desconhecido';
                deployResult = `❌ **Dry-run falhou**\n${errors}`;
              }
            } catch (e) {
              deployResult = '⚠️ Não foi possível ler resultado do deploy';
            }

            let analysisResult = '';
            try {
              const analysis = fs.readFileSync('/tmp/analysis_result.txt', 'utf8');
              analysisResult = analysis.trim() ? `\n\n### 🔍 Code Analyzer\n\`\`\`\n${analysis.substring(0, 3000)}\n\`\`\`` : '\n\n### 🔍 Code Analyzer\n✅ Sem problemas encontrados';
            } catch (e) {}

            const changedApex = `${{ steps.changed.outputs.apex_classes }}`;
            const testClasses = `${{ steps.changed.outputs.test_classes }}`;

            const body = `## UAT PR Validation Report ${deployStatus}

            **Branch:** \`${{ github.head_ref }}\` → \`UAT\`
            **Org:** UAT (enerzee-UAT)

            ### 📦 Escopo
            **Apex alterado:** ${changedApex || '_nenhum_'}
            **Testes mapeados:** ${testClasses || '_nenhum — RunLocalTests usado_'}

            ### 🚀 Dry-run Deploy
            ${deployResult}${analysisResult}

            ---
            _Gerado automaticamente por [UAT PR Validation workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
