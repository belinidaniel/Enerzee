name: PR Validation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate against Production
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for git diff

      # ─── Setup Node + SF CLI ─────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SF CLI
        run: npm install --global @salesforce/cli@latest

      - name: Install sfdx-git-delta
        run: echo y | sf plugins install sfdx-git-delta

      # ─── Authenticate to Production ──────────────────────────────────────────
      # Secret: SFDX_AUTH_URL_PRD
      # Como gerar: sf org display --verbose --target-org <alias> | grep "Sfdx Auth Url"
      - name: Authenticate Production
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_PRD }}" > /tmp/auth_url.txt
          sf org login sfdx-url --sfdx-url-file /tmp/auth_url.txt --alias enerzee-PRD --set-default
          rm /tmp/auth_url.txt

      # ─── Identify changed files ───────────────────────────────────────────────
      - name: Get changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '\.(cls|trigger|lwc|flow-meta\.xml|object-meta\.xml|field-meta\.xml|permissionset-meta\.xml|flexipage-meta\.xml|labels-meta\.xml)' || true)
          echo "Changed metadata files:"
          echo "$CHANGED"

          # Apex classes and triggers changed (for test mapping)
          APEX=$(git diff --name-only origin/main...HEAD | grep '\.cls$' | grep -v 'Test\.cls$' | sed 's|force-app/main/default/classes/||' | sed 's|\.cls||' || true)
          TESTS=$(git diff --name-only origin/main...HEAD | grep 'Test\.cls$' | sed 's|force-app/main/default/classes/||' | sed 's|\.cls||' || true)

          # Auto-discover test classes for changed non-test classes
          for cls in $APEX; do
            test_file="force-app/main/default/classes/${cls}Test.cls"
            if [ -f "$test_file" ]; then
              TESTS="$TESTS ${cls}Test"
            fi
          done

          TESTS=$(echo "$TESTS" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
          APEX=$(echo "$APEX" | tr '\n' ' ' | xargs)
          echo "apex_classes=$APEX" >> $GITHUB_OUTPUT
          echo "test_classes=$TESTS" >> $GITHUB_OUTPUT
          echo "has_changes=$([ -n "$CHANGED" ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      # ─── Generate delta package (only PR changes) ────────────────────────────
      - name: Generate delta package
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          MERGE_BASE=$(git merge-base HEAD origin/main)
          echo "Delta from: $MERGE_BASE → HEAD (${{ github.sha }})"
          sf sgd source delta \
            --from "$MERGE_BASE" \
            --to HEAD \
            --source force-app \
            --output .
          echo "--- package.xml ---"
          cat package/package.xml
          echo "--- destructiveChanges.xml ---"
          cat destructiveChanges/destructiveChanges.xml

      # ─── Static Analysis (PMD via Salesforce Code Analyzer) ──────────────────
      - name: Run Code Analyzer
        if: steps.changed.outputs.has_changes == 'true'
        id: analysis
        continue-on-error: true
        run: |
          sf plugins install @salesforce/sfdx-scanner

          CHANGED_APEX=$(git diff --name-only origin/main...HEAD | grep '\.cls$' | tr '\n' ',' | sed 's/,$//')

          if [ -n "$CHANGED_APEX" ]; then
            sf scanner run \
              --target "$CHANGED_APEX" \
              --format table \
              --severity-threshold 2 \
              --engine pmd \
              2>&1 | tee /tmp/analysis_result.txt || true
          else
            echo "No Apex files changed." | tee /tmp/analysis_result.txt
          fi

      # ─── Dry-run Deploy (Validation) ─────────────────────────────────────────
      - name: Dry-run Deploy Validation
        if: steps.changed.outputs.has_changes == 'true'
        id: deploy
        run: |
          DESTRUCTIVE_ARG=""
          if grep -q '<types>' ./destructiveChanges/destructiveChanges.xml 2>/dev/null; then
            DESTRUCTIVE_ARG="--post-destructive-changes destructiveChanges/destructiveChanges.xml"
          fi

          sf project deploy start \
            --manifest package/package.xml \
            --target-org enerzee-PRD \
            --dry-run \
            --test-level RunLocalTests \
            $DESTRUCTIVE_ARG \
            --json > /tmp/deploy_result.json 2>&1
          DEPLOY_EXIT=$?

          # Surface errors as GitHub Actions annotations
          jq -r '.result.details.componentFailures[]? | "::error file=\(.fileName),line=\(.lineNumber)::\(.problem)"' /tmp/deploy_result.json 2>/dev/null || true
          jq -r '.result.details.runTestResult.failures[]? | "::error::\(.testName): \(.message)"' /tmp/deploy_result.json 2>/dev/null || true
          jq -r '.result.details.runTestResult.codeCoverageWarnings[]? | "::warning::\(.message)"' /tmp/deploy_result.json 2>/dev/null || true

          exit $DEPLOY_EXIT

      # ─── Job Summary + Comment on PR ─────────────────────────────────────────
      - name: Write job summary and comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── Parse deploy result ──────────────────────────────────────────
            let deployStatus = '⚠️';
            let deployResult = '⚠️ Deploy result not available';
            let compileErrors = [];
            let testFailures = [];
            let coverageWarnings = [];

            try {
              const json = JSON.parse(fs.readFileSync('/tmp/deploy_result.json', 'utf8'));
              if (json.status === 0) {
                deployStatus = '✅';
                deployResult = '✅ **Dry-run passed** — sem erros de compilação ou testes';
              } else {
                deployStatus = '❌';
                const details = json?.result?.details || {};
                compileErrors = details.componentFailures || [];
                testFailures = (details.runTestResult?.failures || []);
                coverageWarnings = (details.runTestResult?.codeCoverageWarnings || []);
                deployResult = `❌ **Dry-run falhou** — ${compileErrors.length} erros de compilação, ${testFailures.length} falhas de teste`;
                if (!compileErrors.length && !testFailures.length) {
                  deployResult = `❌ **Dry-run falhou** — ${json.message || 'Erro desconhecido'}`;
                }
              }
            } catch (e) {
              deployResult = `⚠️ Não foi possível ler resultado do deploy: ${e.message}`;
            }

            let analysisResult = '';
            try {
              const analysis = fs.readFileSync('/tmp/analysis_result.txt', 'utf8');
              analysisResult = analysis.trim()
                ? `\n\n### 🔍 Code Analyzer\n\`\`\`\n${analysis.substring(0, 3000)}\n\`\`\``
                : '\n\n### 🔍 Code Analyzer\n✅ Sem problemas encontrados';
            } catch (e) {}

            // ── Build error sections ─────────────────────────────────────────
            let compileSection = '';
            if (compileErrors.length) {
              const rows = compileErrors.map(e =>
                `| \`${e.fileName}\` | ${e.lineNumber || '-'} | ${e.problem} |`
              ).join('\n');
              compileSection = `\n\n### 🔴 Erros de Compilação (${compileErrors.length})\n| Arquivo | Linha | Erro |\n|---|---|---|\n${rows}`;
            }

            let testSection = '';
            if (testFailures.length) {
              const rows = testFailures.slice(0, 100).map(f =>
                `| \`${f.testName}\` | ${(f.message || '').replace(/\|/g, '\\|').substring(0, 150)} |`
              ).join('\n');
              const truncNote = testFailures.length > 100 ? `\n_... e mais ${testFailures.length - 100} falhas. Ver [Job Summary](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})_` : '';
              testSection = `\n\n### 🔴 Falhas de Teste (${testFailures.length})\n| Teste | Mensagem |\n|---|---|\n${rows}${truncNote}`;
            }

            let coverageSection = '';
            if (coverageWarnings.length) {
              const rows = coverageWarnings.map(w => `- ${w.message}`).join('\n');
              coverageSection = `\n\n### ⚠️ Cobertura Insuficiente (${coverageWarnings.length})\n${rows}`;
            }

            const changedApex = `${{ steps.changed.outputs.apex_classes }}`;

            // ── Write to Job Summary (visível no Actions, sem limite) ────────
            const summary = [
              `## PR Validation ${deployStatus}`,
              `**Branch:** \`${{ github.head_ref }}\` → \`main\` | **Org:** enerzee-PRD`,
              `### 🚀 Resultado`,
              deployResult,
              compileSection,
              testSection,
              coverageSection,
              analysisResult,
              `---`,
              `**Apex alterado:** ${changedApex || '_nenhum_'}`,
            ].filter(Boolean).join('\n');

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary + '\n');

            // ── Comment on PR ────────────────────────────────────────────────
            const body = [
              `## PR Validation Report ${deployStatus}`,
              `**Branch:** \`${{ github.head_ref }}\` → \`main\` | **Org:** Production (enerzee-PRD)`,
              `### 🚀 Dry-run Deploy`,
              deployResult,
              compileSection,
              testSection,
              coverageSection,
              analysisResult,
              `---`,
              `_Gerado automaticamente por [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})_`,
            ].filter(Boolean).join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
